services:
  minstock-bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  minstock-web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    command: >
      sh -c "cd /app && python -m uvicorn minstock.web:app --host 0.0.0.0 --port 8080"
